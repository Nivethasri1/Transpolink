server.port=8085
spring.application.name=compliance-service
spring.profiles.active=dev

spring.datasource.url=jdbc:mysql://localhost:3306/transpolink_compliance?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

jwt.secret=transpolink-secret-key-must-be-at-least-256-bits-long
