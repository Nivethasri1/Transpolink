server.port=8086
spring.application.name=reporting-service
spring.profiles.active=dev

spring.datasource.url=jdbc:mysql://localhost:3306/transpolink_reporting?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Cross-service DB URLs for PDF report generation
report.db.incident.url=jdbc:mysql://localhost:3306/transpolink_incident?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
report.db.traffic.url=jdbc:mysql://localhost:3306/transpolink_traffic?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
report.db.transport.url=jdbc:mysql://localhost:3306/transpolink_transport?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
report.db.compliance.url=jdbc:mysql://localhost:3306/transpolink_compliance?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
report.db.username=root
report.db.password=root

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.cloud.client.ip-address}:${server.port}

jwt.secret=${JWT_SECRET}
